<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Miembro del Personal</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />

    <!-- Config de Tailwind -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>

    <!-- ======================
             CSS
    ======================= -->
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                "FILL" 0,
                "wght" 400,
                "GRAD" 0,
                "opsz" 24;
        }

        .form-input {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper .material-symbols-outlined {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #4c739a;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark">

    <!-- ===========================
             HTML
    ============================ -->
    <div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 sm:p-6 md:p-8">
        <div
            class="w-full max-w-3xl rounded-xl border border-slate-200/80 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-background-dark/50 sm:p-8 md:p-10">

            <!-- Título -->
            <div class="mb-8">
                <h1 class="text-3xl font-black text-[#0d141b] dark:text-white sm:text-4xl">
                    Editar Miembro del Personal
                </h1>
                <p class="mt-2 text-base text-slate-500 dark:text-slate-400">
                    Actualice la información del miembro del personal y guarde los cambios.
                </p>
            </div>

            <!-- Formulario -->
<div class="flex flex-col gap-6">


<!-- nombre / apellido -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <label class="flex flex-col">
    <p class="text-slate-800 dark:text-slate-200 font-medium pb-2"> Nombre</p>
    <input type="nombre" class="form-input rounded-lg border bg-slate-50 dark:bg-slate-800 h-14 p-3.5" placeholder="Ej, Sebastian"/>
  </label>
  <label class="flex flex-col">
    <p class="text-slate-800 dark:text-slate-200 font-medium pb-2">Apellido</p>
    <input type="apellido" class="form-input rounded-lg border bg-slate-50 dark:bg-slate-800 h-14 p-3.5" placeholder="Ej, Muñoz"/>
  </label>
</div>

<!-- Email / Tel -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <label class="flex flex-col">
    <p class="text-slate-800 dark:text-slate-200 font-medium pb-2">Correo electrónico</p>
    <input type="email" class="form-input rounded-lg border bg-slate-50 dark:bg-slate-800 h-14 p-3.5" placeholder="ejemplo@empresa.com"/>
  </label>
  <label class="flex flex-col">
    <p class="text-slate-800 dark:text-slate-200 font-medium pb-2">Número de teléfono</p>
    <input type="tel" class="form-input rounded-lg border bg-slate-50 dark:bg-slate-800 h-14 p-3.5" placeholder="+57 (312) 414-8236"/>
  </label>
</div>

  <label class="flex flex-col">
    <p class="text-slate-800 dark:text-slate-200 font-medium pb-2">Tipo de Documento</p>
    <div class="relative">
      <select class="form-select rounded-lg border bg-slate-50 dark:bg-slate-800 h-14 p-3.5 w-full">
        <option disabled selected>Tipo De Documento</option>
        <option>C.C</option>
        <option>C.E</option>
        <option>PPT</option>
      </select>
      <span class="material-symbols-outlined absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400">expand_more</span>
    </div>
  </label>
  <label class="flex flex-col">
    <p class="text-slate-800 dark:text-slate-200 font-medium pb-2">N.Documento</p>
    <input type="ID" class="form-input rounded-lg border bg-slate-50 dark:bg-slate-800 h-14 p-3.5" placeholder="ej.1015485799"/>
  </label>
</div>
<div>
  <label class="flex flex-col">
    <p class="text-slate-800 dark:text-slate-200 font-medium pb-2">Observación</p>
    <input type="text" class="form-input rounded-lg border bg-slate-50 dark:bg-slate-800 h-14 p-3.5" placeholder="Observación"/>
  </label>
</div>

                <!-- Botones -->
                <div
                    class="flex items-center justify-end gap-4 border-t border-slate-200 pt-6 dark:border-slate-800">
                    <a href="GestionPersonal.html"><button type="button"
                        class="rounded-lg bg-slate-100 px-5 py-3 text-base font-semibold text-slate-700 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
                        Cancelar
                    </button></a>

                    <button type="submit"
                        class="flex items-center gap-2 rounded-lg bg-primary px-5 py-3 text-base font-semibold text-white hover:bg-primary/90">
                        <span class="material-symbols-outlined text-xl">save</span>
                        Guardar cambios
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- ======================
             JS
    ======================= -->
    <script>
        document.getElementById("staff-form").addEventListener("submit", function (e) {
            e.preventDefault();

            alert("✔ Los datos del miembro del personal han sido actualizados correctamente.");
        });
    </script>

</body>

</html>
