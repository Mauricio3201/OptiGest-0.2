<!DOCTYPE html>
<html lang="es" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Activo</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: { display: ["Inter", "sans-serif"] },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px",
                    },
                },
            },
        };
    </script>

    <!-- ================================
                 CSS
    =================================-->
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24;
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark">

    <!-- ================================
                HTML
    =================================-->
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

        <div class="layout-container flex h-full grow flex-col">
            <div class="px-4 sm:px-10 md:px-20 lg:px-40 flex flex-1 justify-center py-10 md:py-20">

                <div class="layout-content-container flex flex-col w-full max-w-[960px] flex-1">
                    <div
                        class="bg-white dark:bg-background-dark rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 sm:p-8 md:p-12">

                        <!-- Encabezado -->
                        <div class="mb-8">
                            <h1
                                class="text-slate-900 dark:text-slate-50 text-3xl md:text-4xl font-black tracking-[-0.033em]">
                                Editar Activo
                            </h1>
                            <p class="text-slate-500 dark:text-slate-400 text-base">
                                Modifique la información del activo y guarde los cambios.
                            </p>
                        </div>

                        <form id="edit-asset-form" class="flex flex-col gap-6">

                            <!-- Nombre + Identificador -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                <label class="flex flex-col">
                                    <p class="text-slate-800 dark:text-slate-200 pb-2">Nombre del activo</p>
                                    <input type="text" id="asset-name"
                                        value=""
                                        placeholder="Ej. Laptop Dell XPS 15"
                                        class="form-input h-14 rounded-lg border p-3.5 bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-700 text-slate-900 dark:text-slate-50" />
                                </label>

                                <label class="flex flex-col">
                                    <p class="text-slate-800 dark:text-slate-200 pb-2">Identificador único</p>
                                    <input type="text" id="asset-id"
                                        value=""
                                        placeholder="Ej. ACT-00123"
                                        class="form-input h-14 rounded-lg border p-3.5 bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-700" />
                                </label>

                            </div>

                            <!-- Ubicación + Estado -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                <label class="flex flex-col">
                                    <p class="text-slate-800 dark:text-slate-200 pb-2">Ubicación</p>
                                    <div class="relative">
                                        <select id="asset-location"
                                            class="form-select h-14 w-full rounded-lg border p-3.5 appearance-none bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-700">
                                            <option>Oficina Principal</option>
                                            <option selected>Almacen A</option>
                                            <option>Almacen B</option>
                                        </select>
                                        <span
                                            class="material-symbols-outlined absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                                    </div>
                                </label>

                                <label class="flex flex-col">
                                    <p class="text-slate-800 dark:text-slate-200 pb-2">Estado</p>
                                    <div class="relative">
                                        <select id="asset-status"
                                            class="form-select h-14 w-full rounded-lg border p-3.5 appearance-none bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-700">
                                            <option selected>En uso</option>
                                            <option>En mantenimiento</option>
                                            <option>Almacenado</option>
                                            <option>De baja</option>
                                        </select>
                                        <span
                                            class="material-symbols-outlined absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                                    </div>
                                </label>

                            </div>

                            <!-- Fecha + Valor -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                <label class="flex flex-col">
                                    <p class="text-slate-800 dark:text-slate-200 pb-2">Fecha de adquisición</p>
                                    <div class="relative">
                                        <input type="text" id="asset-date"
                                            value=""
                                            placeholder="DD/MM/AAAA"
                                            class="form-input h-14 w-full rounded-lg border p-3.5 pr-12 bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-700" />
                                        <span
                                            class="material-symbols-outlined absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400">calendar_today</span>
                                    </div>
                                </label>

                                <label class="flex flex-col">
                                    <p class="text-slate-800 dark:text-slate-200 pb-2">Valor(COP)
                                    <div class="relative flex">
                                        <span
                                            class="inline-flex items-center justify-center h-14 w-14 bg-slate-100 dark:bg-slate-700 border border-r-0 border-slate-300 dark:border-slate-700 text-slate-500">$</span>
                                        <input type="number" id="asset-value"
                                            value=""
                                            placeholder="500.000"   
                                            class="form-input h-14 w-full rounded-r-lg border p-3.5 bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-700" />
                                    </div>
                                </label>

                            </div>

                            <!-- Botones -->
                            <div
                                class="flex flex-col-reverse sm:flex-row justify-end items-center gap-3 mt-6 pt-6 border-t border-slate-200 dark:border-slate-800">

                                <a href="GestionActivos.html"><button type="button"
                                    class="h-12 px-6 rounded-lg bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-800 dark:text-slate-200">
                                    Cancelar
                                </button></a>

                                <button type="submit"
                                    class="h-12 px-6 rounded-lg bg-primary text-white hover:bg-primary/90">
                                    Guardar cambios
                                </button>

                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- ================================
                 JAVASCRIPT
    =================================-->
   

</body>

</html>
