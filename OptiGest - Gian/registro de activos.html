<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Nuevo Activo</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>

    <!-- =======================
          ESTILOS (CSS)
    ======================== -->
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24;
        }

        .form-input {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper .material-symbols-outlined {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #4c739a;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark">

    <div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 sm:p-6 md:p-8">
        <div class="w-full max-w-3xl rounded-xl border border-slate-200/80 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-background-dark/50 sm:p-8 md:p-10">

            <!-- Encabezado -->
            <div class="mb-8">
                <h1 class="text-3xl font-black leading-tight tracking-tight text-[#0d141b] dark:text-white sm:text-4xl">
                    Registrar Nuevo Activo
                </h1>
                <p class="mt-2 text-base text-slate-500 dark:text-slate-400">
                    Complete los siguientes campos para añadir un nuevo activo al inventario.
                </p>
            </div>

            <!-- FORMULARIO -->
            <form id="asset-form" class="space-y-6">

                <!-- Información Básica -->
                <div class="grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-2">

                    <!-- Nombre -->
                    <div class="sm:col-span-2">
                        <label for="asset-name" class="block text-base font-medium text-[#0d141b] dark:text-slate-200">Nombre del activo</label>
                        <div class="mt-2">
                            <input id="asset-name" name="asset_name" type="text"
                                placeholder="Ej: Laptop HP EliteBook 840 G8"
                                class="form-input block h-12 w-full rounded-lg border border-[#cfdbe7] bg-background-light p-3 text-base text-[#0d141b] placeholder:text-[#4c739a] dark:border-slate-700 dark:bg-background-dark dark:text-white"
                                required />
                        </div>
                    </div>

                    <!-- ID -->
                    <div>
                        <label for="asset-id" class="block text-base font-medium text-[#0d141b] dark:text-slate-200">Identificador Único</label>
                        <div class="mt-2">
                            <input id="asset-id" name="asset_id" type="text" placeholder="Ej: LAP-00123"
                                class="form-input block h-12 w-full rounded-lg border border-[#cfdbe7] bg-background-light p-3 text-base text-[#0d141b] placeholder:text-[#4c739a] dark:border-slate-700 dark:bg-background-dark dark:text-white"
                                required />
                        </div>
                    </div>

                    <!-- Valor -->
                    <div>
                        <label for="asset-value" class="block text-base font-medium text-[#0d141b] dark:text-slate-200">Valor (COP)</label>
                        <div class="relative mt-2">
                            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                                <span class="text-[#4c739a] sm:text-base">$</span>
                            </div>
                            <input id="asset-value" name="asset_value" type="number" min="0" step="0.01"
                                placeholder="500.000"
                                class="form-input block h-12 w-full rounded-lg border border-[#cfdbe7] bg-background-light pl-7 pr-3 text-base text-[#0d141b] placeholder:text-[#4c739a] dark:border-slate-700 dark:bg-background-dark dark:text-white"
                                required />
                        </div>
                    </div>
                </div>

                <!-- Detalles -->
                <div class="grid grid-cols-1 gap-x-6 gap-y-6 border-t border-slate-200 pt-6 dark:border-slate-800 sm:grid-cols-2">

                    <!-- Ubicación -->
                    <div>
                        <label for="asset-location" class="block text-base font-medium text-[#0d141b] dark:text-slate-200">Ubicación</label>
                        <div class="select-wrapper mt-2">
                            <select id="asset-location" name="asset_location"
                                class="form-input block h-12 w-full rounded-lg border border-[#cfdbe7] bg-background-light p-3 pr-10 text-base text-[#0d141b] dark:border-slate-700 dark:bg-background-dark dark:text-white"
                                required>
                                <option value="">Seleccionar ubicación</option>
                                <option value="oficina-central">Oficina Central</option>
                                <option value="almacen-a">Almacen A</option>
                                <option value="sucursal-norte">Almacen B</option>
                            </select>
                            <span class="material-symbols-outlined">unfold_more</span>
                        </div>
                    </div>

                    <!-- Estado -->
                    <div>
                        <label for="asset-status" class="block text-base font-medium text-[#0d141b] dark:text-slate-200">Estado</label>
                        <div class="select-wrapper mt-2">
                            <select id="asset-status" name="asset_status"
                                class="form-input block h-12 w-full rounded-lg border border-[#cfdbe7] bg-background-light p-3 pr-10 text-base text-[#0d141b] dark:border-slate-700 dark:bg-background-dark dark:text-white"
                                required>
                                <option value="">Seleccionar estado</option>
                                <option value="operativo">Operativo</option>
                                <option value="mantenimiento">En mantenimiento</option>
                                <option value="fuera-de-servicio">Fuera de servicio</option>
                            </select>
                            <span class="material-symbols-outlined">unfold_more</span>
                        </div>
                    </div>

                    <!-- Fecha -->
                    <div class="sm:col-span-2">
                        <label for="acquisition-date" class="block text-base font-medium text-[#0d141b] dark:text-slate-200">Fecha de Adquisición</label>
                        <div class="relative mt-2">
                            <input id="acquisition-date" name="acquisition_date" type="date"
                                class="form-input block h-12 w-full rounded-lg border border-[#cfdbe7] bg-background-light p-3 pr-10 text-base text-[#0d141b] dark:border-slate-700 dark:bg-background-dark dark:text-white"
                                required />
                            <span class="material-symbols-outlined pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-[#4c739a]">calendar_today</span>
                        </div>
                    </div>
                </div>

                <!-- Notas -->
                <div class="border-t border-slate-200 pt-6 dark:border-slate-800">
                    <label for="additional-info" class="block text-base font-medium text-[#0d141b] dark:text-slate-200">Información Adicional</label>
                    <textarea id="additional-info" name="additional_info" rows="4"
                        placeholder="Añadir notas, descripción física o detalles relevantes..."
                        class="form-input mt-2 block w-full rounded-lg border border-[#cfdbe7] bg-background-light p-3 text-base text-[#0d141b] placeholder:text-[#4c739a] dark:border-slate-700 dark:bg-background-dark dark:text-white"></textarea>
                </div>

                <!-- Botones -->
                 <a href="GestionActivos.html"> 
                <div class="flex items-center justify-end gap-4 border-t border-slate-200 pt-6 dark:border-slate-800">
                    <button type="button"
                        class="rounded-lg bg-slate-100 px-5 py-3 text-base font-semibold text-slate-700 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
                        Cancelar
                    </button>

                    <button type="submit"
                        class="flex items-center gap-2 rounded-lg bg-primary px-5 py-3 text-base font-semibold text-white hover:bg-primary/90">
                        <span class="material-symbols-outlined text-xl">save</span>
                        Guardar Activo
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- =======================
          JAVASCRIPT
    ======================== -->
    <script>
        document.getElementById("asset-form").addEventListener("submit", function (e) {
            const requiredFields = ["asset-name", "asset-id", "asset-value", "asset-location", "asset-status"];

            for (const id of requiredFields) {
                if (!document.getElementById(id).value.trim()) {
                    alert("⚠ Por favor complete todos los campos obligatorios.");
                    e.preventDefault();
                    return;
                }
            }

            alert("✔ Activo registrado correctamente.");
        });
    </script>

</body>
</html>
