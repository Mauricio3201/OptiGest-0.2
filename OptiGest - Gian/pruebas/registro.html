<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Usuario</title>
</head>
<body>

  <h2>Registro</h2>

  <form id="formRegistro">

    <input type="text" id="usuario" placeholder="Usuario" required><br><br>

    <input type="email" id="correo" placeholder="Correo electrónico" required><br><br>

    <input type="text" id="telefono" placeholder="Número de teléfono" required><br><br>

    <input type="password" id="password" placeholder="Contraseña" required><br><br>

    <button type="submit">Registrar</button>
  </form>

  <br>
  <a href="iniciosecion.html">Ir a inicio de sesión</a>

  <!-- JAVASCRIPT -->
  <script>
    function obtenerBD() {
      return JSON.parse(localStorage.getItem("usuariosDB")) || [];
    }

    function guardarBD(data) {
      localStorage.setItem("usuariosDB", JSON.stringify(data));
    }

    document.getElementById("formRegistro").addEventListener("submit", function (e) {
      e.preventDefault();

      const usuario = document.getElementById("usuario").value;
      const correo = document.getElementById("correo").value;
      const telefono = document.getElementById("telefono").value;
      const password = document.getElementById("password").value;

      let baseDatos = obtenerBD();

      // Validar si el usuario ya existe
      const existe = baseDatos.find(u => u.usuario === usuario);
      if (existe) {
        alert("❌ El usuario ya existe.");
        return;
      }

      // Crear el usuario
      const nuevoUsuario = {
        id: Date.now(),
        usuario,
        correo,
        telefono,
        password
      };

      baseDatos.push(nuevoUsuario);
      guardarBD(baseDatos);

      alert("✔ Registro exitoso");
      document.getElementById("formRegistro").reset();
    });
  </script>

</body>
</html>
