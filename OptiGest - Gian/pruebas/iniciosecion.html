<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio de Sesión</title>
</head>
<body>

  <h2>Inicio de Sesión</h2>

  <form id="formLogin">

    <input type="text" id="usuarioLogin" placeholder="Usuario" required><br><br>

    <input type="password" id="passwordLogin" placeholder="Contraseña" required><br><br>

    <button type="submit">Ingresar</button>
  </form>

  <br>
  <a href="registro.html">Ir a registro</a>

  <script>
  function obtenerBD() {
    return JSON.parse(localStorage.getItem("usuariosDB")) || [];
  }

  document.getElementById("formLogin").addEventListener("submit", function (e) {
    e.preventDefault();

    const usuario = document.getElementById("usuarioLogin").value;
    const password = document.getElementById("passwordLogin").value;

    const baseDatos = obtenerBD();

    // Buscar usuario
    const encontrado = baseDatos.find(u => u.usuario === usuario);

    if (!encontrado) {
      alert("❌ Usuario no encontrado");
      return;
    }

    if (encontrado.password !== password) {
      alert("❌ Contraseña incorrecta");
      return;
    }

    // OJO: aquí van backticks
    alert(`✔ Bienvenido ${encontrado.usuario}`);

    // Guardar sesión
    localStorage.setItem("usuarioActivo", JSON.stringify(encontrado));

    // Redirigir al dashboard
    window.location.href = "panel.html";
  });
</script>


</body>
</html>
