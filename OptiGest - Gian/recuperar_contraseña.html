<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect" />
  <link as="style"
    href="https://fonts.googleapis.com/css2?display=swap&amp;family=Inter%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    onload="this.rel='stylesheet'" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <title>Recuperar Contraseña - OptiGest</title>
  <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style type="text/tailwindcss">
    :root {
      --primary-color: #1193d4;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-800" style='font-family: "Inter", "Noto Sans", sans-serif'>
  <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
    <header
      class="flex w-full items-center justify-between whitespace-nowrap border-b border-gray-200 px-6 sm:px-10 py-4">
      <div class="flex items-center gap-3 text-gray-900">
        <div class="h-8 w-8 text-[var(--primary-color)]">
          <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M44 11.2727C44 14.0109 39.8386 16.3957 33.69 17.6364C39.8386 18.877 44 21.2618 44 24C44 26.7382 39.8386 29.123 33.69 30.3636C39.8386 31.6043 44 33.9891 44 36.7273C44 40.7439 35.0457 44 24 44C12.9543 44 4 40.7439 4 36.7273C4 33.9891 8.16144 31.6043 14.31 30.3636C8.16144 29.123 4 26.7382 4 24C4 21.2618 8.16144 18.877 14.31 17.6364C8.16144 16.3957 4 14.0109 4 11.2727C4 7.25611 12.9543 4 24 4C35.0457 4 44 7.25611 44 11.2727Z"
              fill="currentColor"></path>
          </svg>
        </div>
        <h1 class="text-xl font-bold leading-tight tracking-tight">
          OptiGest
        </h1>
      </div>
      <div class="hidden items-center gap-8 md:flex">
        <a class="text-sm font-medium text-gray-600 hover:text-gray-900" href="#">Inicio</a>
        <a class="text-sm font-medium text-gray-600 hover:text-gray-900" href="#">Productos</a>
        <a class="text-sm font-medium text-gray-600 hover:text-gray-900" href="#">Servicios</a>
        <a class="text-sm font-medium text-gray-600 hover:text-gray-900" href="#">Contacto</a>
      </div>
      <div class="flex items-center gap-4">
        <a class="hidden min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-md h-10 px-4 bg-gray-200 text-gray-800 text-sm font-bold leading-normal tracking-wide transition-colors hover:bg-gray-300 sm:flex"
          href="inicio_sesion.html">
          <span class="truncate">Iniciar sesión</span>
        </a>
        <button class="md:hidden">
          <span class="material-symbols-outlined"> menu </span>
        </button>
      </div>
    </header>
    <main class="flex flex-1 items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
      <div class="w-full max-w-md space-y-8">
        <div class="flex flex-col items-center">
          <div class="mb-4 h-20 w-20 text-[var(--primary-color)]">
            <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M44 11.2727C44 14.0109 39.8386 16.3957 33.69 17.6364C39.8386 18.877 44 21.2618 44 24C44 26.7382 39.8386 29.123 33.69 30.3636C39.8386 31.6043 44 33.9891 44 36.7273C44 40.7439 35.0457 44 24 44C12.9543 44 4 40.7439 4 36.7273C4 33.9891 8.16144 31.6043 14.31 30.3636C8.16144 29.123 4 26.7382 4 24C4 21.2618 8.16144 18.877 14.31 17.6364C8.16144 16.3957 4 14.0109 4 11.2727C4 7.25611 12.9543 4 24 4C35.0457 4 44 7.25611 44 11.2727Z"
                fill="currentColor"></path>
            </svg>
          </div>
          <h2 class="text-3xl font-extrabold tracking-tight text-gray-900">
            ¿Olvidaste tu contraseña?
          </h2>
          <p class="mt-2 text-base text-gray-600">
            Ingresa tu correo electrónico y te enviaremos instrucciones para
            restablecerla.
          </p>
        </div>
        <form action="#" class="mt-8 space-y-6" method="POST">
          <div class="rounded-md shadow-sm -space-y-px">
            <div>
              <label class="sr-only" for="email-address">Correo electrónico</label>
              <div class="relative">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                  <span class="material-symbols-outlined text-gray-400">mail</span>
                </div>
                <input autocomplete="email"
                  class="relative block w-full appearance-none rounded-lg border border-gray-300 px-3 py-4 pl-10 text-gray-900 placeholder-gray-500 focus:z-10 focus:border-[var(--primary-color)] focus:outline-none focus:ring-[var(--primary-color)] sm:text-sm"
                  id="email-address" name="email" placeholder="Tu correo electrónico" required="" type="email" />
              </div>
            </div>
          </div>
          <div>
            <button
              class="group relative flex w-full justify-center rounded-md border border-transparent bg-[var(--primary-color)] py-3 px-4 text-sm font-semibold text-white shadow-lg transition-all duration-300 ease-in-out hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)] focus:ring-offset-2 transform hover:-translate-y-1"
              type="submit">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                <span class="material-symbols-outlined h-5 w-5 text-blue-300 group-hover:text-blue-200">lock_open</span>
              </span>
              Enviar instrucciones
            </button>
          </div>
        </form>
        <p class="text-center text-sm text-gray-600">
          ¿Recuerdas tu contraseña?
          <a class="font-medium text-[var(--primary-color)] hover:text-opacity-80" href="inicio_sesion.html">Inicia sesión</a>
        </p>
      </div>
    </main>
  </div>

</body>

</html>
